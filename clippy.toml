# 单函数行数上限。对应 CLAUDE.md「单函数 ≤ 300 行」。
too-many-lines-threshold = 300

# 项目内部数据不面对不可信输入,不需要 SipHash 抗 DoS;hash 容器一律 Fx。
# 个别确需 std 版的位置用 `#[allow(clippy::disallowed_types)]` 逐条豁免并注释理由。
disallowed-types = [
    { path = "std::collections::HashMap", reason = "用 rustc_hash::FxHashMap(项目约定:hash 容器一律 Fx)" },
    { path = "std::collections::HashSet", reason = "用 rustc_hash::FxHashSet(项目约定:hash 容器一律 Fx)" },
]
