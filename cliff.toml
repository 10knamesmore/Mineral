# git-cliff:从 dev 上的 Conventional Commits 自动生成 CHANGELOG。
#
# 用法(发布前,在 dev 上,需先 `cargo install git-cliff`):
#   git cliff --unreleased --tag vX.Y.Z --prepend CHANGELOG.md
# 只渲染「未发布」区间(上个 tag 之后的 commit)成一个新版块,prepend 到 CHANGELOG 顶部,
# 不动历史手写条目。生成后**手工润色**(commit 主题偏简,过一遍措辞)再 commit。

[changelog]
header = "# Changelog\n"
# Tera 模板。版本头用 `## [x.y.z] — YYYY-MM-DD`(em-dash,与历史条目一致);
# 组按 `<!-- N -->` 前缀排序后 striptags 去掉注释显示英文组名(见 commit_parsers)。
# 每条尾随短 hash,链到 GitHub commit 页可直接点过去。
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/10knamesmore/Mineral/commit/{{ commit.id }}))
{% endfor %}\
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# 保留**用户可感知**的类型 + 任何破坏性提交;其余(test/chore/docs/ci/style/build…)跳过。
# 约定:用户能感知的改动就该打成 feat/fix 而非 refactor —— 按用户影响选 type。但带 `!` 的
# 破坏性提交(即便 type 是 refactor)永远先归 Breaking Changes 置顶,不靠人每次记得改 type:
# 「内部重构但破坏 daemon↔client wire 兼容」这类必须在 changelog 现身(细则见 CONTRIBUTING.md)。
# 第一条规则匹配 `type!:` / `type(scope)!:` 形态;feat!/fix! 也归此组(破坏性优先于分类)。
commit_parsers = [
  { message = "^[a-z]+(\\(.+?\\))?!", group = "<!-- -1 -->Breaking Changes" },
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = ".*", skip = true },
]

# 只输出匹配到分组的 commit(skip 的不计入)。
filter_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
