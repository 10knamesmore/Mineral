name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ALSA 开发头文件是**编译期**依赖:rodio/cpal 经 alsa-sys → pkg-config 链接
      # libasound,缺它 build 直接挂。运行期无声卡由 audio engine 降级 null 兜底,
      # 不再需要 PulseAudio null-sink 那套运行期 hack。
      - name: 安装 ALSA 开发库
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # nextest 作运行器(进程隔离 + daemon e2e 串行组,见 .config/nextest.toml)。
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # INSTA_UPDATE=no:快照不匹配 / 缺基准直接失败,绝不在 CI 写 .snap.new。
      # --no-fail-fast:不提前收手,一次跑完拿到完整失败清单(suite 很快,省时可忽略)。
      - name: test
        run: cargo nextest run --workspace --no-fail-fast
        env:
          INSTA_UPDATE: "no"

      # nextest 不跑 doctest,单独兜底。
      - name: doctest
        run: cargo test --workspace --doc
